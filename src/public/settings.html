<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Configuración</title>
    <link rel="stylesheet" href="css/styles.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f1f1f1;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            /* Ensures padding doesn't affect width */
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: #4285F4;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }

        button:hover {
            background-color: #3367D6;
        }

        .error {
            color: red;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Configuración</h1>
        <div class="form-group">
            <label for="password">Nueva Contraseña</label>
            <input type="password" id="password" placeholder="Ingresa tu nueva contraseña" />
        </div>
        <div class="form-group">
            <label for="confirm-password">Confirmar Contraseña</label>
            <input type="password" id="confirm-password" placeholder="Confirma tu contraseña" />
            <div id="error-msg" class="error">Las contraseñas no coinciden.</div>
        </div>
        <button id="save-btn">Guardar</button>
    </div>

    <script>
        // Helper function to check password strength
        function isStrongPassword(pwd) {
            // At least 8 characters, includes uppercase, lowercase, number, and special character
            const strongRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\[\]{};':"\\|,.<>/?-]).{8,}$/;
            return strongRegex.test(pwd);
        }

        const saveBtn = document.getElementById('save-btn');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const errorMsg = document.getElementById('error-msg');
        const strengthMsg = document.createElement('div');
        strengthMsg.id = 'strength-msg';
        strengthMsg.style.color = 'red';
        strengthMsg.style.fontSize = '0.9rem';
        strengthMsg.style.marginTop = '0.5rem';
        strengthMsg.style.display = 'none';
        passwordInput.parentNode.appendChild(strengthMsg);

        saveBtn.addEventListener('click', async () => {
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            // Reset messages
            errorMsg.style.display = 'none';
            strengthMsg.style.display = 'none';

            // Check password match
            if (password !== confirmPassword) {
                errorMsg.style.display = 'block';
                return;
            }

            // Check password strength
            if (!isStrongPassword(password)) {
                strengthMsg.textContent = 'La contraseña debe tener al menos 8 caracteres, incluir mayúsculas, minúsculas, números y símbolos.';
                strengthMsg.style.display = 'block';
                return;
            }

            // Ensure password is not empty (redundant after strength check but kept for safety)
            if (!password) {
                alert("Por favor ingresa una contraseña.");
                return;
            }

            try {
                const response = await fetch('/settings', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password })
                });

                if (response.ok) {
                    const result = await response.json();
                    alert(result || "Contraseña actualizada exitosamente");
                } else {
                    alert("Hubo un error al actualizar la contraseña");
                }
            } catch (error) {
                console.error(error);
                alert("Error de conexión");
            }
        });
    </script>
</body>

</html>
